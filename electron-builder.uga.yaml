appId: "OFIJUPenal.UGA"
productName: "Gestión de Audiencias Ofijup - UGA"
copyright: "Copyright (c) 2024 José López"
directories:
  output: ../dist/uga
files:
  - "out/**/*"
  - "main/**/*"
  - "package.json"
  - "!node_modules/puppeteer/**/*"
  - "!node_modules/puppeteer-core/**/*"
  - "!node_modules/chromium-bidi/**/*"
win:
  target:
    - dir
    - portable
  icon: "public/favicon2.png"
linux:
  target:
    - dir
    - appimage
  icon: "public/favicon2.png"
mac:
  target:
    - dir
    - dmg
  icon: "public/favicon2.png"
